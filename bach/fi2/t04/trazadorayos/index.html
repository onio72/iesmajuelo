<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor de Óptica Geométrica v2.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        body { background-color: #f8fafc; overflow: hidden; }
        canvas { background-color: #ffffff; cursor: default; }
        input[type="range"] { cursor: pointer; }
        .panel-scroll { scrollbar-width: thin; scrollbar-color: #cbd5e1 #ffffff; }
        .ray-desc { transition: all 0.3s ease; }
        input:disabled + span { color: #cbd5e1; text-decoration: line-through; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans text-slate-900">

    <header class="bg-indigo-950 text-white p-4 shadow-lg flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-500 p-2 rounded-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Tutor de Óptica Geométrica <span class="text-indigo-400 ml-2 text-sm font-mono">v2.8</span></h1>
        </div>
        <div class="text-[10px] font-bold uppercase tracking-widest text-indigo-300">
            Laboratorio de Física Interactiva
        </div>
    </header>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        <aside class="w-full md:w-80 bg-white border-r border-slate-200 p-6 overflow-y-auto panel-scroll shadow-sm">
            <section class="mb-8">
                <h2 class="text-xs font-bold uppercase text-indigo-600 mb-6 tracking-widest border-b border-indigo-50 pb-2">Parámetros del Sistema</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Elemento Óptico</label>
                        <select id="elementType" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition">
                            <option value="lens-conv">Lente Convergente</option>
                            <option value="lens-div">Lente Divergente</option>
                            <option value="mirror-conc" selected>Espejo Cóncavo</option>
                            <option value="mirror-conv">Espejo Convexo</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-semibold text-slate-700">Distancia Focal \( f \) (cm)</label>
                            <span id="fVal" class="text-xs font-mono text-indigo-600 font-bold">100</span>
                        </div>
                        <input type="range" id="focalLength" min="50" max="180" value="100" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none accent-indigo-600">
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-semibold text-slate-700">Distancia Objeto \( s \) (cm)</label>
                            <span id="sVal" class="text-xs font-mono text-indigo-600 font-bold">150</span>
                        </div>
                        <input type="range" id="objPos" min="20" max="450" value="150" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none accent-indigo-600">
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-semibold text-slate-700">Altura Objeto \( y \) (cm)</label>
                            <span id="hVal" class="text-xs font-mono text-indigo-600 font-bold">50</span>
                        </div>
                        <input type="range" id="objHeight" min="10" max="100" value="50" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none accent-indigo-600">
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-xs font-bold uppercase text-slate-400 mb-4 tracking-widest border-b border-slate-50 pb-2">Rayos Principales</h2>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="rayParallel" checked class="w-4 h-4 text-red-600 rounded border-slate-300 focus:ring-red-500">
                        <span class="text-sm text-slate-600 group-hover:text-slate-900 transition font-medium">Rayo 1</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group" id="labelFocal">
                        <input type="checkbox" id="rayFocal" checked class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500 disabled:opacity-30 disabled:cursor-not-allowed">
                        <span class="text-sm text-slate-600 group-hover:text-slate-900 transition font-medium">Rayo 2</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="rayCentral" checked class="w-4 h-4 text-amber-600 rounded border-slate-300 focus:ring-amber-500">
                        <span class="text-sm text-slate-600 group-hover:text-slate-900 transition font-medium">Rayo 3</span>
                    </label>
                </div>
            </section>
        </aside>

        <main class="flex-1 relative flex flex-col p-4 md:p-6 bg-slate-50 overflow-y-auto">
            <div id="canvasContainer" class="min-h-[450px] flex-1 relative bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200 mb-6">
                <canvas id="opticalCanvas"></canvas>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-tighter">Resultados Numéricos</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-end border-b border-slate-50 pb-2">
                            <span class="text-sm text-slate-600">Posición Imagen \( s' \)</span>
                            <span id="resSPrime" class="font-mono font-bold text-indigo-600">-</span>
                        </div>
                        <div class="flex justify-between items-end border-b border-slate-50 pb-2">
                            <span class="text-sm text-slate-600">Aumento \( M \)</span>
                            <span id="resMag" class="font-mono font-bold text-slate-800">-</span>
                        </div>
                        <div class="pt-2">
                            <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Características de la imagen</span>
                            <p id="resNature" class="text-sm font-bold text-indigo-900 italic">-</p>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-tighter">Explicación de los rayos</h3>
                    <div id="explanationsArea" class="space-y-3 text-sm leading-relaxed text-slate-600">
                        <div id="descParallel" class="ray-desc hidden flex gap-3 border-l-4 border-red-500 pl-3">
                            <p id="txtParallel"></p>
                        </div>
                        <div id="descFocal" class="ray-desc hidden flex gap-3 border-l-4 border-emerald-500 pl-3">
                            <p id="txtFocal"></p>
                        </div>
                        <div id="descCentral" class="ray-desc hidden flex gap-3 border-l-4 border-amber-500 pl-3">
                            <p id="txtCentral"></p>
                        </div>
                        <div id="noRaySelected" class="text-slate-400 italic text-xs">Selecciona un rayo para ver su explicación física.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('opticalCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        const ui = {
            type: document.getElementById('elementType'),
            f: document.getElementById('focalLength'),
            s: document.getElementById('objPos'),
            y: document.getElementById('objHeight'),
            rParallel: document.getElementById('rayParallel'),
            rFocal: document.getElementById('rayFocal'),
            rCentral: document.getElementById('rayCentral'),
            fVal: document.getElementById('fVal'),
            sVal: document.getElementById('sVal'),
            hVal: document.getElementById('hVal'),
            resSPrime: document.getElementById('resSPrime'),
            resMag: document.getElementById('resMag'),
            resNature: document.getElementById('resNature'),
            descP: document.getElementById('descParallel'),
            descF: document.getElementById('descFocal'),
            descC: document.getElementById('descCentral'),
            txtP: document.getElementById('txtParallel'),
            txtF: document.getElementById('txtFocal'),
            txtC: document.getElementById('txtCentral'),
            noRay: document.getElementById('noRaySelected')
        };

        let centerX, centerY;

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            draw();
        }

        function updateExplanations() {
            const isLens = ui.type.value.startsWith('lens');
            if (isLens) {
                ui.txtP.innerHTML = `<strong>Rayo 1:</strong> Parte del extremo superior del objeto. Incide paralelo al eje óptico y, tras refractarse se desvía de modo que su prolongación pasa por el foco imagen \\( F' \\).`;
                ui.txtF.innerHTML = `<strong>Rayo 2:</strong> Parte del extremo superior del objeto. Apunta hacia el foco objeto \\( F \\) y al atravesar la lente, se refracta emergiendo paralelo al eje óptico.`;
                ui.txtC.innerHTML = `<strong>Rayo 3:</strong> Parte del extremo superior del objeto. Atraviesa el centro óptico sin sufrir desviación al refractarse.`;
            } else {
                ui.txtP.innerHTML = `<strong>Rayo 1:</strong> Parte del extremo superior del objeto. Incide paralelo al eje óptico y se refleja pasando por el foco \\( F \\) (o su prolongación).`;
                ui.txtF.innerHTML = `<strong>Rayo 2:</strong> Parte del extremo superior del objeto. Pasa por el foco \\( F \\) (o apunta hacia él) e incide en el espejo, reflejándose paralelo al eje óptico.`;
                ui.txtC.innerHTML = `<strong>Rayo 3:</strong> Parte del extremo superior del objeto. Pasa por el centro de curvatura \\( C \\) e incide perpendicularmente al espejo, reflejándose sobre sí mismo.`;
            }

            ui.descP.style.display = ui.rParallel.checked ? 'flex' : 'none';
            ui.descF.style.display = ui.rFocal.checked ? 'flex' : 'none';
            ui.descC.style.display = ui.rCentral.checked ? 'flex' : 'none';
            ui.noRay.style.display = (!ui.rParallel.checked && !ui.rFocal.checked && !ui.rCentral.checked) ? 'block' : 'none';

            if (window.renderMathInElement) renderMathInElement(document.body);
        }

        function drawX(x, y, label) {
            const size = 6;
            ctx.save();
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX + x - size, centerY + y - size);
            ctx.lineTo(centerX + x + size, centerY + y + size);
            ctx.moveTo(centerX + x + size, centerY + y - size);
            ctx.lineTo(centerX + x - size, centerY + y + size);
            ctx.stroke();
            ctx.fillStyle = '#6366f1';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, centerX + x, centerY + y + 20);
            ctx.restore();
        }

        function drawArrowOnLine(x1, y1, x2, y2, pos = 0.5) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const midX = x1 + (x2 - x1) * pos;
            const midY = y1 + (y2 - y1) * pos;
            const size = 10;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(midX - size * Math.cos(angle - Math.PI / 6), midY - size * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(midX, midY);
            ctx.lineTo(midX - size * Math.cos(angle + Math.PI / 6), midY - size * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
            ctx.restore();
        }

        function drawElement(type, f) {
            ctx.save();
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (type === 'lens-conv') {
                ctx.moveTo(centerX, centerY - 200); ctx.lineTo(centerX, centerY + 200);
                ctx.moveTo(centerX - 12, centerY - 185); ctx.lineTo(centerX, centerY - 200); ctx.lineTo(centerX + 12, centerY - 185);
                ctx.moveTo(centerX - 12, centerY + 185); ctx.lineTo(centerX, centerY + 200); ctx.lineTo(centerX + 12, centerY + 185);
            } else if (type === 'lens-div') {
                ctx.moveTo(centerX, centerY - 200); ctx.lineTo(centerX, centerY + 200);
                ctx.moveTo(centerX - 12, centerY - 215); ctx.lineTo(centerX, centerY - 200); ctx.lineTo(centerX + 12, centerY - 215);
                ctx.moveTo(centerX - 12, centerY + 215); ctx.lineTo(centerX, centerY + 200); ctx.lineTo(centerX + 12, centerY + 215);
            } else if (type === 'mirror-conc') {
                ctx.arc(centerX - f * 2, centerY, f * 2, -Math.PI / 3, Math.PI / 3);
            } else if (type === 'mirror-conv') {
                ctx.arc(centerX + f * 2, centerY, f * 2, Math.PI - Math.PI / 3, Math.PI + Math.PI / 3);
            }
            ctx.stroke();
            ctx.restore();
        }

        function drawArrow(x, h, color, label, isImage = false, labelBelowAxis = false) {
            ctx.save();
            ctx.translate(centerX + x, centerY);
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = isImage ? 2.5 : 3.5;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -h);
            ctx.stroke();
            const head = 8;
            const dir = h > 0 ? 1 : -1;
            ctx.beginPath();
            ctx.moveTo(-head/2, -h + head * dir);
            ctx.lineTo(0, -h);
            ctx.lineTo(head/2, -h + head * dir);
            ctx.fill();
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, 0, labelBelowAxis ? 16 : (h > 0 ? -h - 12 : -h + 18));
            ctx.restore();
        }

        function drawLine(x1, y1, x2, y2, color, dashed = false, arrowPos = -1) {
            ctx.save();
            ctx.strokeStyle = color;
            if (dashed) ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            if (arrowPos >= 0) drawArrowOnLine(x1, y1, x2, y2, arrowPos);
            ctx.restore();
        }

        function getMirrorIntersection(startX, startY, dirX, dirY, type, f, constrainToArc = true) {
            const R = 2 * f;
            const cx = (type === 'mirror-conc') ? centerX - R : centerX + R;
            const cy = centerY;
            const a = dirX * dirX + dirY * dirY;
            const b = 2 * (dirX * (startX - cx) + dirY * (startY - cy));
            const c = (startX - cx) ** 2 + (startY - cy) ** 2 - R * R;
            const disc = b * b - 4 * a * c;
            if (disc < 0 || a === 0) return null;

            const sqrtDisc = Math.sqrt(disc);
            const roots = [(-b - sqrtDisc) / (2 * a), (-b + sqrtDisc) / (2 * a)];

            const minX = (type === 'mirror-conc') ? centerX - f - 1 : centerX - 1;
            const maxX = (type === 'mirror-conc') ? centerX + 1 : centerX + f + 1;

            let best = null;
            for (const t of roots) {
                if (t <= 0) continue;
                const x = startX + t * dirX;
                const y = startY + t * dirY;
                if (constrainToArc && (x < minX || x > maxX)) continue;
                if (!best || t < best.t) best = { t, x, y };
            }
            return best ? { x: best.x, y: best.y } : null;
        }

        function intersectInfiniteLines(l1, l2) {
            const den = l1.dx * l2.dy - l1.dy * l2.dx;
            if (Math.abs(den) < 1e-9) return null;
            const t = ((l2.x - l1.x) * l2.dy - (l2.y - l1.y) * l2.dx) / den;
            const x = l1.x + t * l1.dx;
            const y = l1.y + t * l1.dy;
            if (!isFinite(x) || !isFinite(y)) return null;
            return { x, y };
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const f = parseInt(ui.f.value);
            const s = parseInt(ui.s.value);
            const y = parseInt(ui.y.value);
            const type = ui.type.value;
            ui.fVal.textContent = f; ui.sVal.textContent = s; ui.hVal.textContent = y;

            const isLens = type.startsWith('lens');
            let focalSign = (type === 'lens-div' || type === 'mirror-conv') ? -f : f;
            const onFocalPoint = (s === f && focalSign > 0);
            if (onFocalPoint) { ui.rFocal.checked = false; ui.rFocal.disabled = true; } else { ui.rFocal.disabled = false; }
            updateExplanations();

            ctx.beginPath(); ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1;
            ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();

            drawElement(type, f);
            if (isLens) {
                if (type === 'lens-div') { drawX(-f, 0, "F'"); drawX(f, 0, "F"); }
                else { drawX(-f, 0, 'F'); drawX(f, 0, "F'"); }
            } else {
                drawX(-focalSign, 0, "F");
                drawX(-focalSign * 2, 0, "C");
            }

            let sPrime = (focalSign * s) / (s - focalSign);
            let mag = -sPrime / s;
            let yPrime = y * mag;
            let imgX = isLens ? sPrime : -sPrime;

            const activeCount = [ui.rParallel.checked, ui.rFocal.checked, ui.rCentral.checked].filter(Boolean).length;
            const isInfinite = !isFinite(sPrime) || Math.abs(sPrime) > 8000;

            const startX = centerX - s;
            const startY = centerY - y;
            const imgAbsX = centerX + imgX;
            const imgAbsY = centerY - yPrime;
            const realImage = sPrime > 0;
            const reflectedRays = [];

            // --- RAYO 1 ---
            if (ui.rParallel.checked) {
                const color = '#ef4444';
                let xInc = centerX;
                if (!isLens) {
                    let R = f * 2;
                    let dx = R - Math.sqrt(Math.max(0, R*R - y*y));
                    xInc = (type === 'mirror-conc') ? centerX - dx : centerX + dx;
                }
                drawLine(startX, startY, xInc, startY, color, false, 0.5);

                if (isLens) {
                    if (type === 'lens-conv') {
                        const targetX = centerX + 1500;
                        const slope = (centerY - startY) / f;
                        const targetY = startY + slope * (targetX - centerX);
                        drawLine(centerX, startY, targetX, targetY, color, false, 0.1);
                        reflectedRays.push({ x: centerX, y: startY, dx: targetX - centerX, dy: targetY - startY });
                        if (s < f) drawLine(centerX, startY, centerX + imgX, centerY - yPrime, color, true);
                    } else {
                        const angle = Math.atan2(startY - centerY, centerX - (centerX - f));
                        const endX = centerX + 1500;
                        const endY = startY + Math.tan(angle) * (endX - centerX);
                        drawLine(centerX, startY, endX, endY, color, false, 0.1);
                        reflectedRays.push({ x: centerX, y: startY, dx: endX - centerX, dy: endY - startY });
                        drawLine(centerX, startY, centerX - f, centerY, color, true);
                    }
                } else {
                    let fPointX = -focalSign;
                    if (type === 'mirror-conc') {
                        if (realImage) {
                            const endX = xInc + (imgAbsX - xInc) * 8;
                            const endY = startY + (imgAbsY - startY) * 8;
                            drawLine(xInc, startY, endX, endY, color, false, 0.1);
                        } else {
                            const mRef = (centerY - startY) / (centerX + fPointX - xInc);
                            const endX = xInc - 1500;
                            const endY = startY + mRef * (endX - xInc);
                            drawLine(xInc, startY, endX, endY, color, false, 0.1);
                            drawLine(xInc, startY, imgAbsX, imgAbsY, color, true);
                        }
                    } else {
                        const mRef = (startY - centerY) / (xInc - (centerX + fPointX));
                        const endX = xInc - 1500;
                        const endY = startY + mRef * (endX - xInc);
                        drawLine(xInc, startY, endX, endY, color, false, 0.1);
                        // Prolongación punteada a F con flecha hacia derecha
                        drawLine(xInc, startY, centerX + fPointX, centerY, color, true, 0.4);
                    }
                }
            }

            // --- RAYO 2 ---
            if (ui.rFocal.checked && !onFocalPoint) {
                const color = '#10b981';
                let targetFX = (type === 'lens-div') ? f : -focalSign;
                let slope = (-y) / (-s - targetFX);
                let interceptY = slope * (0 - targetFX);
                
                let xInc = centerX;
                if (!isLens) {
                    let R = f * 2;
                    let dy = Math.abs(interceptY);
                    let dx = R - Math.sqrt(Math.max(0, R*R - dy*dy));
                    xInc = (type === 'mirror-conc') ? centerX - dx : centerX + dx;
                }

                if (isLens) {
                    drawLine(startX, startY, xInc, centerY + interceptY, color, false, 0.5);
                    if (focalSign < 0 || s < f) drawLine(centerX + targetFX, centerY, startX, startY, color, true);
                    drawLine(xInc, centerY + interceptY, centerX + 1500, centerY + interceptY, color, false, 0.1);
                    reflectedRays.push({ x: xInc, y: centerY + interceptY, dx: 1500, dy: 0 });
                    if (focalSign < 0 || s < f) drawLine(xInc, centerY + interceptY, centerX + imgX, centerY - yPrime, color, true);
                } else {
                    if (type === 'mirror-conc') {
                        // Concavo: el rayo incidente pasa por F y alcanza el arco del espejo
                        const Fx = centerX - f;
                        const dirX = Fx - startX;
                        const dirY = centerY - startY;
                        const hit = getMirrorIntersection(startX, startY, dirX, dirY, type, f);
                        const hitX = hit ? hit.x : xInc;
                        const hitY = hit ? hit.y : centerY + interceptY;
                        drawLine(startX, startY, hitX, hitY, color, false, 0.5);
                        if (realImage) {
                            const endX = hitX + (imgAbsX - hitX) * 8;
                            const endY = hitY + (imgAbsY - hitY) * 8;
                            drawLine(hitX, hitY, endX, endY, color, false, 0.1);
                        } else {
                            drawLine(hitX, hitY, hitX - 1500, hitY, color, false, 0.1);
                            drawLine(hitX, hitY, imgAbsX, imgAbsY, color, true);
                        }
                    } else {
                        // Convexo: Ida objeto -> espejo
                        drawLine(startX, startY, xInc, centerY + interceptY, color, false, 0.5);
                        // Refleja paralelo izquierda
                        drawLine(xInc, centerY + interceptY, xInc - 1500, centerY + interceptY, color, false, 0.1);
                        // Prolongación derecha hacia infinito con flecha derecha
                        drawLine(xInc, centerY + interceptY, centerX + 1500, centerY + interceptY, color, true, 0.3);
                        // Punteada objeto -> espejo (detrás)
                        drawLine(xInc, centerY + interceptY, centerX + targetFX, centerY, color, true);
                    }
                }
            }

            // --- RAYO 3 ---
            if (ui.rCentral.checked) {
                const color = '#f59e0b';
                if (isLens) {
                    drawLine(startX, startY, centerX, centerY, color, false, 0.5);
                    drawLine(centerX, centerY, centerX + 1500, centerY + (y/s)*1500, color, false, 0.1);
                    reflectedRays.push({ x: centerX, y: centerY, dx: 1500, dy: (y / s) * 1500 });
                    if (s < f || focalSign < 0) drawLine(centerX, centerY, centerX + imgX, centerY - yPrime, color, true);
                } else {
                    let Cx = -focalSign * 2;
                    let m = (-y - 0) / (-s - Cx);
                    let R = f * 2;
                    let finalXInc = (type === 'mirror-conc') ? centerX - (R - Math.sqrt(Math.max(0, R*R - Math.pow(m*(Cx - (-s)), 2)))) : centerX + (R - Math.sqrt(Math.max(0, R*R - Math.pow(m*(Cx - (-s)), 2))));
                    let finalYInc = centerY + m * (finalXInc - centerX - Cx);

                    if (type === 'mirror-conc') {
                        const CabsX = centerX + Cx;
                        let dirX = CabsX - startX;
                        let dirY = centerY - startY;
                        if (dirX < 0) { dirX = -dirX; dirY = -dirY; }
                        const hit = getMirrorIntersection(startX, startY, dirX, dirY, type, f, false);
                        if (hit) { finalXInc = hit.x; finalYInc = hit.y; }

                        // Ida hasta el arco del espejo
                        drawLine(startX, startY, finalXInc, finalYInc, color, false, 0.5);
                        if (realImage) {
                            const endX = finalXInc + (imgAbsX - finalXInc) * 8;
                            const endY = finalYInc + (imgAbsY - finalYInc) * 8;
                            drawLine(finalXInc, finalYInc, endX, endY, color, false, 0.2);
                        } else {
                            const backX = finalXInc + (startX - finalXInc) * 20;
                            const backY = finalYInc + (startY - finalYInc) * 20;
                            drawLine(finalXInc, finalYInc, backX, backY, color, false, 0.2);
                            drawLine(finalXInc, finalYInc, imgAbsX, imgAbsY, color, true);
                        }
                    } else {
                        // Convexo
                        drawLine(startX, startY, finalXInc, finalYInc, color, false, 0.5);
                        // Vuelta ida y vuelta
                        drawLine(finalXInc, finalYInc, startX, startY, color, false, 0.5);
                        // Punteada objeto hacia izquierda infinito con flecha izquierda
                        drawLine(startX, startY, startX - 1500, startY - 1500*m, color, true, 0.4);
                        // Punteada espejo a C con flecha derecha
                        drawLine(finalXInc, finalYInc, centerX + Cx, centerY, color, true, 0.4);
                    }
                }
            }

            const canShowImage = activeCount >= 2 && !isInfinite;

            drawArrow(-s, y, '#2563eb', 'OBJETO');
            if (canShowImage) drawArrow(imgX, yPrime, '#dc2626', 'IMAGEN', true, type === 'lens-div');

            ui.resSPrime.textContent = !isInfinite ? sPrime.toFixed(1) + ' cm' : '∞';
            ui.resMag.textContent = !isInfinite ? mag.toFixed(2) : '-';
            let nature = "";
            if (onFocalPoint || isInfinite) nature = "No se forma imagen";
            else {
                let real = sPrime > 0;
                nature = (real ? "Real" : "Virtual") + (mag < 0 ? ", Invertida" : ", Derecha") + (Math.abs(mag) > 1 ? ", de mayor tamaño" : ", de menor tamaño");
            }
            ui.resNature.textContent = (canShowImage || onFocalPoint || isInfinite) ? nature : "-";
        }

        const ctrlList = [ui.type, ui.f, ui.s, ui.y, ui.rParallel, ui.rFocal, ui.rCentral];
        ctrlList.forEach(el => el.addEventListener('input', draw));
        window.addEventListener('resize', resize);
        window.onload = () => resize();
    </script>
</body>
</html>
