<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Lente Biconvexa Simétrica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .control-panel {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .math-value {
            font-family: 'Cambria Math', 'Times New Roman', serif;
            font-style: italic;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Simulador de Lente Biconvexa Simétrica</h1>
            <p class="text-slate-600">Laboratorio Virtual de Óptica Geométrica</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="control-panel space-y-6">
                <!-- Control R: 30 a 300 cm -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Radio de curvatura (\( R \)): <span id="valR" class="font-bold text-blue-600 math-value">100</span> cm
                    </label>
                    <input type="range" id="inputR" min="30" max="300" value="100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Rango: 30 a 300 cm (\( R_1 = -R_2 = R \))</p>
                </div>

                <!-- Control n -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Índice de Refracción (\( n \)): <span id="valN" class="font-bold text-emerald-600 math-value">1.50</span>
                    </label>
                    <input type="range" id="inputN" min="1.1" max="2.5" step="0.01" value="1.50" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600">
                </div>

                <!-- Resultado Focal -->
                <div class="pt-4 border-t border-slate-100">
                    <div class="p-3 bg-slate-50 rounded-lg">
                        <p class="text-sm text-slate-600">Distancia focal imagen (\( f' \)):</p>
                        <p class="text-2xl font-mono font-bold text-slate-800"><span id="valFocal" class="math-value">100.0</span> cm</p>
                    </div>
                </div>

                <!-- Ecuación -->
                <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-400">
                    <div class="text-sm text-blue-900">
                        \[ \frac{1}{f'} = (n - 1) \frac{2}{R} \]
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 relative">
                <canvas id="opticsCanvas" class="w-full h-[450px]"></canvas>
                <div class="absolute bottom-4 right-4 text-[10px] text-slate-400 uppercase tracking-widest">Vista Lateral de la Lente</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        
        const inputR = document.getElementById('inputR');
        const inputN = document.getElementById('inputN');
        const valR = document.getElementById('valR');
        const valN = document.getElementById('valN');
        const valFocal = document.getElementById('valFocal');

        const OFFSET_X = 150; 

        function setupCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function calculateFocal(n, r) {
            // Para lente biconvexa simétrica: 1/f' = (n-1)(1/R - 1/(-R)) = (n-1)(2/R)
            const invF = (n - 1) * (2 / r);
            return 1 / invF;
        }

        function drawLens(r) {
            const r1 = r;
            const r2 = -r;
            const centerY = canvas.height / 2;
            const centerX = OFFSET_X;
            const h = 80; 
            
            const visualScale = 2500;
            const s1 = visualScale / r1;           
            const s2 = -visualScale / r2; 

            const dynamicThickness = Math.max(12, 10 - s1 - s2);
            const xLeft = centerX - dynamicThickness / 2;
            const xRight = centerX + dynamicThickness / 2;

            ctx.beginPath();
            ctx.fillStyle = 'rgba(173, 216, 230, 0.4)';
            ctx.strokeStyle = '#0284c7';
            ctx.lineWidth = 2;

            ctx.moveTo(xLeft, centerY - h);
            ctx.lineTo(xRight, centerY - h);
            ctx.quadraticCurveTo(xRight + s2, centerY, xRight, centerY + h);
            ctx.lineTo(xLeft, centerY + h);
            ctx.quadraticCurveTo(xLeft - s1, centerY, xLeft, centerY - h);
            
            ctx.fill();
            ctx.stroke();
            ctx.closePath();

            ctx.fillStyle = '#64748b';
            ctx.font = '10px sans-serif';
            ctx.fillText("R", xLeft - s1 - 15, centerY + h + 15);
        }

        function drawRays(focal, r) {
            const r1 = r;
            const r2 = -r;
            const centerY = canvas.height / 2;
            const centerX = OFFSET_X;
            const numRays = 9;
            const spacing = 18;
            const h = 80;

            const visualScale = 2500;
            const s1 = visualScale / r1;           
            const s2 = -visualScale / r2; 
            
            const dynamicThickness = Math.max(12, 10 - s1 - s2);
            const xLeftBase = centerX - dynamicThickness / 2;
            const xRightBase = centerX + dynamicThickness / 2;

            ctx.lineWidth = 1.2;

            for (let i = 0; i < numRays; i++) {
                const y = centerY + (i - (numRays - 1) / 2) * spacing;
                const t = (y - (centerY - h)) / (2 * h);
                const lensX1 = xLeftBase - 2 * s1 * t * (1 - t);
                const lensX2 = xRightBase + 2 * s2 * t * (1 - t);

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(245, 158, 11, 0.6)';
                ctx.moveTo(0, y);
                ctx.lineTo(lensX1, y);
                ctx.stroke();

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)';
                ctx.moveTo(lensX2, y);
                
                if (Math.abs(focal) > 10000) {
                    ctx.lineTo(canvas.width, y);
                } else {
                    const focusX = centerX + focal; 
                    const focusY = centerY;
                    const dx = focusX - lensX2; 
                    const dy = focusY - y;
                    const slope = dy / dx;
                    
                    const targetX = canvas.width;
                    const targetY = y + slope * (targetX - lensX2);
                    ctx.lineTo(targetX, targetY);
                }
                ctx.stroke();
            }

            if (Math.abs(focal) < 10000 && (centerX + focal) < canvas.width) {
                ctx.beginPath();
                ctx.fillStyle = '#ef4444';
                ctx.arc(centerX + focal, centerY, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = 'italic bold 14px "Times New Roman"';
                ctx.fillText("F'", centerX + focal - 5, centerY - 15);
            }
        }

        function drawAxis() {
            const centerY = canvas.height / 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            const r = parseFloat(inputR.value);
            const n = parseFloat(inputN.value);
            const focal = calculateFocal(n, r);

            valR.innerText = r;
            valN.innerText = n.toFixed(2);
            valFocal.innerText = focal.toFixed(1);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawAxis();
            drawRays(focal, r);
            drawLens(r);
        }

        window.addEventListener('resize', () => {
            setupCanvas();
            draw();
        });

        [inputR, inputN].forEach(input => {
            input.addEventListener('input', draw);
        });

        setupCanvas();
        draw();
    </script>
</body>
</html>
