<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Lente Biconvexa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .control-panel {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .math-value {
            font-family: 'Cambria Math', 'Times New Roman', serif;
            font-style: italic;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Simulador de Lentes Delgadas</h1>
            <p class="text-slate-600">Laboratorio Virtual de Óptica Geométrica - Rangos Ajustados</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="control-panel space-y-6">
                <!-- Control R1: 30 a 300 cm -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Radio \( R_1 \) (Cara Izquierda): <span id="valR1" class="font-bold text-blue-600 math-value">100</span> cm
                    </label>
                    <input type="range" id="inputR1" min="30" max="300" value="100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Rango: 30 cm a 300 cm</p>
                </div>

                <!-- Control R2: -300 a -30 cm -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Radio \( R_2 \) (Cara Derecha): <span id="valR2" class="font-bold text-red-600 math-value">-100</span> cm
                    </label>
                    <input type="range" id="inputR2" min="-300" max="-30" value="-100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-red-600">
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Rango: -300 cm a -30 cm</p>
                </div>

                <!-- Control n -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Índice de Refracción (\( n \)): <span id="valN" class="font-bold text-emerald-600 math-value">1.50</span>
                    </label>
                    <input type="range" id="inputN" min="1.1" max="2.5" step="0.01" value="1.50" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600">
                </div>

                <!-- Checkbox Simetría -->
                <div class="flex items-center space-x-2 pt-2">
                    <input type="checkbox" id="checkSymmetry" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500">
                    <label for="checkSymmetry" class="text-sm font-medium text-slate-700 select-none cursor-pointer">
                        Lente simétrica (\( R_1 = |R_2| \))
                    </label>
                </div>

                <!-- Resultado Focal -->
                <div class="pt-4 border-t border-slate-100">
                    <div class="p-3 bg-slate-50 rounded-lg">
                        <p class="text-sm text-slate-600">Distancia focal imagen (\( f' \)):</p>
                        <p class="text-2xl font-mono font-bold text-slate-800"><span id="valFocal" class="math-value">100.0</span> cm</p>
                    </div>
                </div>

                <!-- Ecuación -->
                <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-400">
                    <div class="text-sm text-blue-900">
                        \[ \frac{1}{f'} = (n - 1) \left( \frac{1}{R_1} - \frac{1}{R_2} \right) \]
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 relative">
                <canvas id="opticsCanvas" class="w-full h-[450px]"></canvas>
                <div class="absolute bottom-4 right-4 text-[10px] text-slate-400 uppercase tracking-widest">Vista Lateral de la Lente</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        
        const inputR1 = document.getElementById('inputR1');
        const inputR2 = document.getElementById('inputR2');
        const inputN = document.getElementById('inputN');
        const checkSymmetry = document.getElementById('checkSymmetry');
        const valR1 = document.getElementById('valR1');
        const valR2 = document.getElementById('valR2');
        const valN = document.getElementById('valN');
        const valFocal = document.getElementById('valFocal');

        const OFFSET_X = 150; 

        function setupCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function calculateFocal(n, r1, r2) {
            const invF = (n - 1) * (1 / r1 - 1 / r2);
            return 1 / invF;
        }

        function handleInput(e) {
            if (checkSymmetry.checked) {
                if (e.target === inputR1) {
                    inputR2.value = -inputR1.value;
                } else if (e.target === inputR2) {
                    inputR1.value = Math.abs(inputR2.value);
                } else if (e.target === checkSymmetry) {
                    inputR2.value = -inputR1.value;
                }
            }
            draw();
        }

        function drawLens(r1, r2) {
            const centerY = canvas.height / 2;
            const centerX = OFFSET_X;
            const h = 80; 

            // Escala visual de las curvaturas
            const visualScale = 2500;
            const s1 = visualScale / r1;           
            const s2 = visualScale / Math.abs(r2); 

            ctx.beginPath();
            ctx.fillStyle = 'rgba(173, 216, 230, 0.4)';
            ctx.strokeStyle = '#0284c7';
            ctx.lineWidth = 2;

            ctx.moveTo(centerX, centerY - h);
            ctx.quadraticCurveTo(centerX + s2, centerY, centerX, centerY + h);
            ctx.quadraticCurveTo(centerX - s1, centerY, centerX, centerY - h);
            
            ctx.fill();
            ctx.stroke();
            ctx.closePath();

            ctx.fillStyle = '#64748b';
            ctx.font = '10px sans-serif';
            ctx.fillText("R1", centerX - s1 - 20, centerY + h + 15);
            ctx.fillText("R2", centerX + s2 + 5, centerY + h + 15);
        }

        function drawRays(focal) {
            const centerY = canvas.height / 2;
            const centerX = OFFSET_X;
            const numRays = 9;
            const spacing = 18;

            ctx.lineWidth = 1.2;

            for (let i = 0; i < numRays; i++) {
                const y = centerY + (i - (numRays - 1) / 2) * spacing;
                
                // Rayo incidente
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(245, 158, 11, 0.6)';
                ctx.moveTo(0, y);
                ctx.lineTo(centerX, y);
                ctx.stroke();

                // Rayo refractado
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)';
                ctx.moveTo(centerX, y);
                
                if (Math.abs(focal) > 10000) {
                    ctx.lineTo(canvas.width, y);
                } else {
                    const focusX = centerX + focal;
                    const focusY = centerY;
                    const dx = focusX - centerX;
                    const dy = focusY - y;
                    const t = (canvas.width - centerX) / dx;
                    ctx.lineTo(canvas.width, y + dy * t);
                }
                ctx.stroke();
            }

            if (Math.abs(focal) < 10000 && (centerX + focal) < canvas.width) {
                ctx.beginPath();
                ctx.fillStyle = '#ef4444';
                ctx.arc(centerX + focal, centerY, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = 'italic bold 14px "Times New Roman"';
                ctx.fillText("F'", centerX + focal - 5, centerY - 15);
            }
        }

        function drawAxis() {
            const centerY = canvas.height / 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            const r1 = parseFloat(inputR1.value);
            const r2 = parseFloat(inputR2.value);
            const n = parseFloat(inputN.value);
            const focal = calculateFocal(n, r1, r2);

            valR1.innerText = r1;
            valR2.innerText = r2;
            valN.innerText = n.toFixed(2);
            valFocal.innerText = focal.toFixed(1);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawAxis();
            drawRays(focal);
            drawLens(r1, r2);
        }

        window.addEventListener('resize', () => {
            setupCanvas();
            draw();
        });

        [inputR1, inputR2, inputN, checkSymmetry].forEach(input => {
            input.addEventListener('input', handleInput);
        });

        setupCanvas();
        draw();
    </script>
</body>
</html>
