<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos con IA - Antonio González</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --secondary: #64748b;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 0.75rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem;
        }
        .header-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--bg-body);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.4;
        }
        .toolbar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
        }
        .toolbar-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .btn-back {
            background: white;
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .breadcrumbs {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            white-space: nowrap;
        }
        .breadcrumb-item { cursor: pointer; }
        .breadcrumb-item:hover { color: var(--primary); }
        main {
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--bg-card);
            padding: 2rem 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .card-icon { font-size: 3rem; margin-bottom: 1rem; }
        .resource-group {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .resource-group h3 { color: var(--primary); margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
        }
        .link-item {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.9rem;
        }
        .link-item:hover { border-color: var(--primary); background: white; transform: translateX(3px); }
        .link-item::before { content: '🔗'; margin-right: 10px; }
        .hidden { display: none !important; }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); background: white; margin-top: auto; color: var(--text-muted); font-size: 0.8rem; }
        @media (max-width: 600px) { .header-content { flex-direction: column; } .grid, .links-grid { grid-template-columns: 1fr; } }
    </style>
</head>

    let navigationStack = ['root'];
    let isSearchActive = false;

    function navigateTo(id) {
        if (!DATA[id]) return;
        document.getElementById('searchInput').value = '';
        isSearchActive = false;
        if (id === 'root') { navigationStack = ['root']; } 
        else { if (navigationStack[navigationStack.length - 1] !== id) navigationStack.push(id); }
        render();
    }

    function goBack() { if (navigationStack.length > 1) { navigationStack.pop(); render(); } }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const app = document.getElementById('app');
        if (query.length < 2) { isSearchActive = false; render(); return; }
        isSearchActive = true;
        document.getElementById('backBtn').classList.remove('hidden');
        
        let results = [];
        Object.keys(DATA).forEach(key => {
            if (DATA[key].groups) {
                DATA[key].groups.forEach(g => {
                    g.links.forEach(l => {
                        if (l.name.toLowerCase().includes(query)) results.push({...l, cat: DATA[key].title});
                    });
                });
            }
        });

        let html = `<div class="links-grid">`;
        results.forEach(r => {
            html += `<a href="${r.url}" class="link-item" target="_blank"><div>${r.name}<br><small style="opacity:0.5">${r.cat}</small></div></a>`;
        });
        app.innerHTML = html + `</div>`;
    }

    function render() {
        if (isSearchActive) return;
        const app = document.getElementById('app');
        const currentId = navigationStack[navigationStack.length - 1];
        const data = DATA[currentId];
        
        // Toolbar / Breadcrumbs
        document.getElementById('backBtn').className = currentId === 'root' ? 'btn-back hidden' : 'btn-back';
        document.getElementById('breadcrumbs').innerHTML = navigationStack.map((s, i) => `<span onclick="jump(${i})">${DATA[s].title}</span>`).join(' / ');

        let html = '';
        if (data.items) {
            html = '<div class="grid">' + data.items.map(i => `
                <div class="card" onclick="${i.url ? `window.open('${i.url}','_self')` : `navigateTo('${i.id}')`}">
                    <div class="card-icon">${i.icon}</div>
                    <h2>${i.title}</h2>
                    <p>${i.desc}</p>
                </div>`).join('') + '</div>';
        } else {
            html = `<h1>${data.title}</h1>` + data.groups.map(g => `
                <div class="resource-group">
                    <h3>${g.name}</h3>
                    <div class="links-grid">${g.links.map(l => `<a href="${l.url}" class="link-item" target="_blank">${l.name}</a>`).join('')}</div>
                </div>`).join('');
        }
        app.innerHTML = html;
        window.scrollTo(0,0);
    }

    function jump(i) { navigationStack = navigationStack.slice(0, i + 1); render(); }

    document.addEventListener('DOMContentLoaded', render);
</script>

</body>

              ]

        departamento: { title: "Dpto FQ", groups: [{ name: "Organización", links: [{ name: "Reparto", url: "https://onio72.github.io/iesmajuelo/departamentoFQ/reparto/" }] }] },

    };

    let navigationStack = ['root'];
    let isSearchActive = false;

    // --- FUNCIONES PRINCIPALES ---

    function navigateTo(id) {
        if (!DATA[id]) return;
        
        document.getElementById('searchInput').value = '';
        isSearchActive = false;

        if (id === 'root') {
            navigationStack = ['root'];
        } else {
            if (navigationStack[navigationStack.length - 1] !== id) {
                navigationStack.push(id);
            }
        }
        render();
    }

    function goBack() {
        if (navigationStack.length > 1) {
            navigationStack.pop();
            render();
        }
    }

    function jumpToStack(index) {
        navigationStack = navigationStack.slice(0, index + 1);
        render();
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const app = document.getElementById('app');
        const backBtn = document.getElementById('backBtn');
        const breadcrumbs = document.getElementById('breadcrumbs');

        if (query.length < 2) {
            isSearchActive = false;
            render();
            return;
        }

        isSearchActive = true;
        backBtn.classList.remove('hidden');
        breadcrumbs.innerHTML = `Resultados: <strong>${query}</strong>`;
        
        const results = [];
        Object.keys(DATA).forEach(key => {
            const node = DATA[key];
            if (node.groups) {
                node.groups.forEach(group => {
                    group.links.forEach(link => {
                        if (link.name.toLowerCase().includes(query) || group.name.toLowerCase().includes(query)) {
                            results.push({ ...link, category: node.title, groupName: group.name });
                        }
                    });
                });
            }
        });

        let html = `<div class="view-container">`;
        if (results.length > 0) {
            html += `<div class="search-results-info">Encontrados ${results.length} recursos</div>`;
            html += `<div class="links-grid">`;
            results.forEach(res => {
                html += `
                    <a href="${res.url}" class="link-item" target="_blank">
                        <div style="display:flex; flex-direction:column">
                            <span>${res.name}</span>
                            <small style="font-size:0.7rem; opacity:0.6">${res.category} › ${res.groupName}</small>
                        </div>
                    </a>`;
            });
            html += `</div>`;
        } else {
            html += `<div class="no-results">🔍 No hay coincidencias</div>`;
        }
        html += `</div>`;
        app.innerHTML = html;
    }

    function render() {
        if (isSearchActive) return;

        const app = document.getElementById('app');
        const backBtn = document.getElementById('backBtn');
        const breadcrumbs = document.getElementById('breadcrumbs');
        const currentId = navigationStack[navigationStack.length - 1];
        const currentData = DATA[currentId];

        if (!app) return;

        // Breadcrumbs logic
        if (currentId === 'root') {
            backBtn.classList.add('hidden');
            breadcrumbs.innerHTML = 'Inicio';
        } else {
            backBtn.classList.remove('hidden');
            breadcrumbs.innerHTML = navigationStack.map((id, index) => 
                `<span class="breadcrumb-item" onclick="jumpToStack(${index})">${DATA[id].title}</span>`
            ).join(' <span class="breadcrumb-sep">/</span> ');
        }

        let html = `<div class="view-container">`;
        
        if (currentData.items) {
            html += `<div class="grid">`;
            currentData.items.forEach(item => {
                html += `
                    <div class="card" onclick="${item.url ? `window.open('${item.url}','_self')` : `navigateTo('${item.id}')`}">
                        <div class="card-icon">${item.icon}</div>
                        <h2>${item.title}</h2>
                        <p>${item.desc || ''}</p>
                    </div>`;
            });
            html += `</div>`;
        } else if (currentData.groups) {
            html += `<h1 class="resource-section-title">${currentData.title}</h1>`;
            currentData.groups.forEach(group => {
                html += `
                    <div class="resource-group">
                        <h3>📂 ${group.name}</h3>
                        <div class="links-grid">
                            ${group.links.map(link => `
                                <a href="${link.url}" class="link-item" target="_blank" rel="noopener">
                                    ${link.name}
                                </a>
                            `).join('')}
                        </div>
                    </div>`;
            });
        }
        
        html += `</div>`;
        app.innerHTML = html;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Inicialización segura cuando el DOM está listo
    document.addEventListener('DOMContentLoaded', () => {
        render();
    });
</script>
