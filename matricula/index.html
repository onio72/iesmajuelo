<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula IES El Majuelo</title>
    <script defer src="https://unpkg.com/lucide@latest" onload="window.renderIcons && window.renderIcons()"></script>
    <style>
        :root {
            --bg: #f5f7f6;
            --panel: #ffffff;
            --ink: #1f2933;
            --muted: #687789;
            --line: #dce4df;
            --green: #4f7f68;
            --green-2: #edf5f0;
            --green-3: #d8e9df;
            --blue: #597d9b;
            --amber: #9a7a3c;
            --red: #a35d5d;
            --shadow: 0 18px 45px rgba(31, 41, 51, 0.08);
            --shadow-soft: 0 8px 24px rgba(31, 41, 51, 0.06);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(216, 233, 223, 0.78), transparent 30%),
                linear-gradient(180deg, #fbfcfb 0%, var(--bg) 44%, #eef3f0 100%);
            color: var(--ink);
        }

        button,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
            text-transform: none;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        }

        .app.start-mode {
            display: block;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.9);
            border-right: 1px solid var(--line);
            box-shadow: 12px 0 30px rgba(31, 41, 51, 0.04);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .start-mode .sidebar,
        .start-mode .content {
            display: none;
        }

        .start-screen {
            min-height: 100vh;
            padding: 36px;
            display: grid;
            align-content: center;
            gap: 28px;
        }

        .start-mode .start-screen {
            display: grid;
        }

        .start-screen:not(.active) {
            display: none;
        }

        .start-header {
            max-width: 820px;
            margin: 0 auto;
            display: grid;
            justify-items: center;
            gap: 10px;
            text-align: center;
        }

        .start-header h1 {
            font-size: clamp(2rem, 4vw, 4rem);
            color: var(--green);
        }

        .start-header p {
            margin: 0;
            color: var(--muted);
            font-size: 1.06rem;
            line-height: 1.45;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 226px));
            justify-content: center;
            gap: 16px;
            width: min(100%, 980px);
            margin: 0 auto;
        }

        .course-button {
            min-height: 150px;
            border: 1px solid rgba(220, 228, 223, 0.95);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--shadow);
            padding: 20px 18px;
            text-align: center;
            display: grid;
            justify-items: center;
            align-content: center;
            justify-content: center;
            gap: 12px;
            color: var(--ink);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .course-button:hover {
            border-color: rgba(79, 127, 104, 0.42);
            background: #fff;
            box-shadow: 0 22px 54px rgba(31, 41, 51, 0.12);
            transform: translateY(-2px);
        }

        .course-button strong {
            font-size: 1.35rem;
            color: var(--green);
            line-height: 1.1;
        }

        .course-button span {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.35;
        }

        .course-button i {
            color: var(--green);
            width: 28px;
            height: 28px;
            padding: 10px;
            box-sizing: content-box;
            border-radius: 999px;
            background: var(--green-2);
        }

        .course-bach1 {
            grid-column: 2;
        }

        .course-bach2 {
            grid-column: 3;
        }

        .brand {
            display: grid;
            gap: 6px;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, #5f9277, #3f7059);
            color: #fff;
            font-weight: 900;
            font-size: 1.7rem;
            letter-spacing: 0;
            box-shadow: 0 12px 24px rgba(79, 127, 104, 0.24);
        }

        h1 {
            margin: 0;
            color: var(--ink);
            font-size: 1.45rem;
            line-height: 1.15;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 0.93rem;
            line-height: 1.4;
        }

        .control-stack {
            display: grid;
            gap: 14px;
        }

        .control {
            display: grid;
            gap: 7px;
        }

        label,
        .field-label {
            color: #5d697a;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: none;
        }

        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--ink);
            padding: 11px 12px;
            outline: none;
        }

        select:focus,
        button:focus-visible {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(89, 125, 155, 0.14);
            outline: none;
        }

        .segmented {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #f7f9fb;
        }

        .segmented button {
            min-height: 36px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            font-weight: 800;
        }

        .segmented button.active {
            background: #fff;
            border-color: #cdd7e4;
            color: var(--green);
            box-shadow: 0 3px 10px rgba(23, 32, 51, 0.07);
        }

        .summary {
            margin-top: auto;
            border-top: 1px solid var(--line);
            padding-top: 16px;
            display: grid;
            gap: 12px;
        }

        .hours-meter {
            display: grid;
            gap: 8px;
        }

        .meter-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            font-weight: 800;
        }

        .meter-row span:last-child {
            font-size: 1.45rem;
        }

        .meter-track {
            height: 10px;
            border-radius: 999px;
            background: #e7eeea;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: var(--green);
            border-radius: inherit;
            transition: width 0.25s ease, background 0.25s ease;
        }

        .status {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            min-height: 34px;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.35;
        }

        .status[data-kind="ok"] {
            color: var(--green);
        }

        .status[data-kind="warn"] {
            color: var(--amber);
        }

        .print-btn {
            border: 1px solid #6c9a81;
            background: #5f9277;
            color: #fff;
            border-radius: 999px;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 800;
        }

        .back-btn {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
            color: var(--ink);
            border-radius: 999px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 800;
        }

        .content {
            min-width: 0;
            padding: 22px;
            display: grid;
            gap: 14px;
            align-content: start;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 20px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 12px;
        }

        .course-title {
            display: grid;
            gap: 5px;
        }

        .course-title h2 {
            margin: 0;
            font-size: clamp(1.55rem, 2.6vw, 2.55rem);
            letter-spacing: 0;
            color: var(--green);
            line-height: 1.05;
        }

        .course-title p {
            margin: 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 32px;
            padding: 0 10px;
            border-radius: 999px;
            background: #eef2f6;
            color: #465366;
            font-size: 0.85rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .chip.green {
            background: var(--green-2);
            color: var(--green);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 20px;
            align-items: start;
        }

        .section {
            display: grid;
            gap: 8px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 2px 0;
        }

        .section-header h3 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 9px;
            color: #263349;
            font-size: 1rem;
            text-transform: none;
            letter-spacing: 0;
        }

        .section-note {
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 700;
            text-align: right;
        }

        .subject-list {
            display: grid;
            gap: 8px;
        }

        .subject-list.fixed-list {
            grid-template-columns: repeat(12, minmax(0, 1fr));
            grid-auto-rows: 48px;
            gap: 6px;
        }

        .subject {
            height: 48px;
            min-height: 0;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: var(--shadow-soft);
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
        }

        .fixed-list .subject {
            height: 100%;
            padding: 7px 8px;
            gap: 8px;
        }

        .subject-main {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subject-icon {
            width: 30px;
            height: 30px;
            border-radius: 11px;
            display: grid;
            place-items: center;
            color: var(--green);
            background: var(--green-2);
            flex: 0 0 auto;
        }

        .fixed-list .subject-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }

        .subject-name {
            min-width: 0;
            display: grid;
            gap: 2px;
        }

        .subject-name strong {
            font-size: 0.97rem;
            line-height: 1.16;
            display: -webkit-box;
            overflow: hidden;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .fixed-list .subject-name strong {
            font-size: 0.86rem;
        }

        .subject-name span {
            color: var(--muted);
            font-size: 0.8rem;
        }

        .fixed-list .subject-name span {
            display: none;
        }

        .hours {
            min-width: 44px;
            height: 34px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: #eef2f6;
            color: #27344a;
            font-weight: 900;
        }

        .fixed-list .hours {
            min-width: 34px;
            height: 26px;
            font-size: 0.82rem;
        }

        .choice-list {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            grid-auto-rows: 48px;
            gap: 8px;
        }

        .choice {
            height: 48px;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            align-content: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.86);
            color: var(--ink);
            text-align: left;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: opacity 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .choice:hover {
            transform: translateY(-1px);
        }

        .choice input {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
        }

        .choice.selected {
            border-color: rgba(79, 127, 104, 0.48);
            background: var(--green-3);
            color: #284332;
        }

        .choice.selected .hours {
            background: rgba(79, 127, 104, 0.16);
            color: #284332;
        }

        .choice-list.has-selection .choice:not(.selected) {
            opacity: 0.5;
        }

        .choice.language-choice {
            cursor: default;
        }

        .choice strong {
            overflow-wrap: anywhere;
            line-height: 1.16;
            font-size: 0.94rem;
            align-self: center;
            display: -webkit-box;
            overflow: hidden;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        @media (max-width: 820px) {
            .subject-list.fixed-list,
            .choice-list {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }
        }

        .selection-panel {
            position: sticky;
            top: 28px;
            display: grid;
            gap: 14px;
        }

        .selected-box {
            border: 1px solid var(--line);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow);
            padding: 16px;
            display: grid;
            gap: 12px;
        }

        .selected-box h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--ink);
        }

        .print-list {
            display: grid;
            gap: 7px;
        }

        .print-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            color: #39465a;
            font-size: 0.9rem;
            line-height: 1.25;
            padding-bottom: 7px;
            border-bottom: 1px solid #edf2ef;
        }

        .print-item:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .empty {
            border: 1px dashed #bac5d3;
            border-radius: var(--radius);
            min-height: 120px;
            display: grid;
            place-items: center;
            color: var(--muted);
            text-align: center;
            padding: 20px;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
        }

        @media (max-width: 1120px) {
            .app {
                grid-template-columns: 300px minmax(0, 1fr);
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .content {
                padding: 18px;
            }

            .selection-panel {
                position: static;
            }
        }

        @media (max-width: 980px) {
            .course-grid {
                grid-template-columns: repeat(2, minmax(150px, 1fr));
                width: min(100%, 520px);
            }

            .course-bach1,
            .course-bach2 {
                grid-column: auto;
            }
        }

        @media (max-width: 820px) {
            .app {
                display: block;
            }

            .sidebar {
                position: static;
                height: auto;
                border-right: 0;
                border-bottom: 1px solid var(--line);
                box-shadow: 0 12px 28px rgba(31, 41, 51, 0.05);
            }

            .content {
                padding: 20px 16px 28px;
            }

            .start-screen {
                padding: 22px 16px;
                align-content: start;
            }

            .topbar {
                display: grid;
            }

            .chips {
                justify-content: flex-start;
            }
        }

        @media (max-width: 560px) {
            .start-screen {
                padding: 18px 14px 28px;
                gap: 18px;
            }

            .start-header h1 {
                font-size: 2rem;
            }

            .start-header p {
                font-size: 0.96rem;
            }

            .course-grid {
                grid-template-columns: 1fr;
                width: 100%;
            }

            .course-button {
                min-height: 118px;
                padding: 16px;
            }

            .sidebar {
                padding: 18px 16px;
            }

            .brand {
                grid-template-columns: 42px 1fr;
                align-items: center;
                column-gap: 12px;
            }

            .brand .subtitle {
                grid-column: 1 / -1;
            }

            .brand-mark {
                width: 42px;
                height: 42px;
                font-size: 1.45rem;
            }

            .summary {
                margin-top: 0;
            }

            .content {
                padding: 16px 12px 24px;
            }

            .course-title h2 {
                font-size: 1.55rem;
            }

            .layout {
                gap: 14px;
            }

            .section-header {
                align-items: flex-start;
                display: grid;
                gap: 4px;
            }

            .section-note {
                text-align: left;
            }

            .subject-list.fixed-list,
            .choice-list {
                grid-template-columns: 1fr;
                grid-auto-rows: 52px;
            }

            .subject,
            .choice {
                grid-column: 1 / -1 !important;
                height: 52px;
            }

            .fixed-list .subject-icon {
                width: 28px;
                height: 28px;
            }

            .fixed-list .subject-name strong {
                font-size: 0.92rem;
            }

            .selected-box {
                border-radius: 16px;
                padding: 14px;
            }
        }

        @media print {
            body {
                background: #fff;
            }

            .sidebar,
            .choice-list,
            .section-note {
                display: none !important;
            }

            .app,
            .layout {
                display: block;
            }

            .content {
                padding: 0;
            }

            .topbar,
            .subject,
            .selected-box {
                box-shadow: none;
            }

            .selection-panel {
                position: static;
                margin-top: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app start-mode">
        <section id="start-screen" class="start-screen active">
            <div class="start-header">
                <div class="brand-mark">A</div>
                <h1>Matrícula IES El Majuelo</h1>
                <p>Elige el curso para ver las materias comunes, itinerarios y optativas disponibles.</p>
            </div>
            <div id="course-grid" class="course-grid"></div>
        </section>

        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">A</div>
                <h1>Matrícula IES El Majuelo</h1>
                <p class="subtitle">Oferta de materias desde 1º de ESO hasta 2º de Bachillerato.</p>
            </div>

            <div class="control-stack">
                <button id="back-btn" class="back-btn" type="button">
                    <i data-lucide="arrow-left"></i>
                    Elegir otro curso
                </button>
                <div id="path-control" class="control"></div>
                <div id="language-control" class="control"></div>
                <div id="religion-control" class="control"></div>
            </div>

            <div class="summary">
                <div class="hours-meter">
                    <div class="meter-row">
                        <span>Horas elegidas</span>
                        <span id="total-hours">0/30</span>
                    </div>
                    <div class="meter-track" aria-hidden="true">
                        <div id="meter-fill" class="meter-fill"></div>
                    </div>
                </div>
                <div id="status" class="status" data-kind="warn"></div>
                <button id="print-btn" class="print-btn" type="button">
                    <i data-lucide="printer"></i>
                    Imprimir resumen
                </button>
            </div>
        </aside>

        <main class="content">
            <header class="topbar">
                <div class="course-title">
                    <h2 id="course-title"></h2>
                    <p id="course-subtitle"></p>
                </div>
                <div id="chips" class="chips"></div>
            </header>

            <div class="layout">
                <div id="subjects-area"></div>
                <aside class="selection-panel">
                    <div class="selected-box">
                        <h3>Mi elección de materias</h3>
                        <div id="print-list" class="print-list"></div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <script>
        const SUBJECT_ICONS = {
            "Lengua Castellana y Literatura": "book-open",
            "Lengua Castellana y Literatura I": "book-open",
            "Lengua castellana y literatura II": "book-open",
            "Matemáticas": "calculator",
            "Matemáticas A": "calculator",
            "Matemáticas B": "calculator",
            "Matemáticas I": "calculator",
            "Matemáticas II": "calculator",
            "Matemáticas Aplicadas a las Ciencias Sociales I": "calculator",
            "Matemáticas Aplicadas a las Ciencias Sociales": "calculator",
            "Educación Física": "dumbbell",
            "Educación física": "dumbbell",
            "Geografía e Historia": "landmark",
            "Historia de España": "landmark",
            "Historia de la Filosofía": "brain",
            "Historia del Mundo contemporaneo": "globe-2",
            "Historia del Arte": "palette",
            "Biología y Geología": "microscope",
            "Biología": "microscope",
            "Geología y Ciencias Ambientales": "mountain",
            "Física y Química": "atom",
            "Física": "magnet",
            "Química": "flask-conical",
            "Filosofía": "brain",
            "Tecnología y Digitalización": "cpu",
            "Tecnología": "wrench",
            "Digitalización": "monitor-cog",
            "Tecnología e Ingeniería I": "cpu",
            "Tecnología e Ingeniería II": "cpu",
            "Tecnologías de la Información y Comunic. I": "monitor",
            "Tecnologías de la Información y Comunic. II": "monitor",
            "Música": "music",
            "Educación Plástica, Visual y Audiovisual": "palette",

                button.addEventListener("click", () => {
                    state.stage = button.dataset.stage;
                    state.course = button.dataset.course;
                    state.path = "";
                    state.started = true;
                    render();
                });
            });
            renderIcons();
        }

        function renderPathControl(course) {
            pathControl.innerHTML = "";
            if (!course.paths) return;

            const label = document.createElement("div");
            label.className = "field-label";
            label.textContent = state.stage === "bach" ? "Modalidad / itinerario" : "Itinerario";

            const select = document.createElement("select");
            select.id = "path";
            select.innerHTML = Object.entries(course.paths).map(([id, path]) => `<option value="${id}">${path.label}</option>`).join("");
            if (!state.path || !course.paths[state.path]) state.path = Object.keys(course.paths)[0];
            select.value = state.path;
            select.addEventListener("change", () => {
                state.path = select.value;
                render();
            });

            pathControl.append(label, select);
        }

        function renderLanguageControl() {
            languageControl.innerHTML = "";
        }

        function oppositeLanguage(language) {
            return language === "Inglés" ? "Francés" : "Inglés";
        }

        function isSecondForeignLanguageName(name) {
            return name === "Segunda Lengua Extranjera" || name === "Segunda Lengua Extranjera II";
        }

        function displaySubject(subject) {
            if (!isSecondForeignLanguageName(subject.name)) return subject;

            const suffix = subject.name.endsWith("II") ? "2ª Lengua Extranjera II" : "2ª Lengua Extranjera";
            return {
                ...subject,
                name: `${oppositeLanguage(state.languages.first)} (${suffix})`
            };
        }

        function isLanguageSubject(subject) {
            return subject.name === "Primera Lengua Extranjera"
                || subject.name === "Segunda Lengua Extranjera"
                || subject.name.startsWith("1ª Lengua extranjera");
        }

        function buildLanguageSections(plan) {
            const fixedLanguages = (plan.fixed || []).filter(isLanguageSubject);
            const firstBase = fixedLanguages.find(subject => subject.name === "Primera Lengua Extranjera" || subject.name.startsWith("1ª Lengua extranjera"));
            const secondBase = fixedLanguages.find(subject => subject.name === "Segunda Lengua Extranjera");
            const sections = [];
            const subjects = [];

            if (firstBase) {
                const firstSubject = {
                    ...firstBase,
                    name: `${state.languages.first} (1ª Lengua Extranjera)`
                };
                sections.push(renderLanguageSection("1ª Lengua extranjera", firstBase.hours, state.languages.first, false));
                subjects.push(firstSubject);
            }

            if (state.course === "eso1" && secondBase) {
                const secondLanguage = oppositeLanguage(state.languages.first);
                const secondSubject = {
                    ...secondBase,
                    name: `${secondLanguage} (2ª Lengua Extranjera)`
                };
                sections.push(renderLanguageSection("2ª Lengua extranjera", secondBase.hours, secondLanguage, true));
                subjects.push(secondSubject);
            }

            return { html: sections.join(""), subjects };
        }

        function renderLanguageSection(title, hours, selectedLanguage, readonly) {
            const optionHtml = ["Inglés", "Francés"].map(language => {
                const selected = selectedLanguage === language;
                return `
                    <button
                        class="choice language-choice ${selected ? "selected" : ""}"
                        type="button"
                        data-language="${language}"
                        ${readonly ? "aria-disabled=\"true\" tabindex=\"-1\"" : ""}
                        style="grid-column: span ${hourSpan(hours)};"
                    >
                        <strong>${language}</strong>
                        <span class="hours">${hours}h</span>
                    </button>
                `;
            }).join("");

            return `
                <section class="section">
                    <div class="section-header">
                        <h3><i data-lucide="languages"></i>${title}</h3>
                        <span class="section-note">${hours} horas</span>
                    </div>
                    <div class="choice-list has-selection">${optionHtml}</div>
                </section>
            `;
        }

        function ensureDefaults(plan) {
            for (const group of plan.choices || []) {
                const key = selectionKey(group.id);
                const current = (state.selections[key] || []).filter(id => group.options.some(option => option.id === id));
                if (group.mode === "hours") {
                    const valid = trimToTargetHours(current, group);
                    if (valid.length === 0) {
                        state.selections[key] = defaultHoursSelection(group);
                    } else {
                        state.selections[key] = valid;
                    }
                } else if (current.length === 0 && group.min > 0) {
                    state.selections[key] = group.options.slice(0, group.min).map(option => option.id);
                } else if (current.length > group.max) {
                    state.selections[key] = current.slice(0, group.max);
                } else {
                    state.selections[key] = current;
                }
            }
        }

        function selectedHours(ids, group) {
            return ids.reduce((sum, id) => {
                const option = group.options.find(item => item.id === id);
                return sum + (option ? option.hours : 0);
            }, 0);
        }

        function trimToTargetHours(ids, group) {
            const valid = [];
            let total = 0;
            for (const id of ids) {
                const option = group.options.find(item => item.id === id);
                if (!option || total + option.hours > group.targetHours) continue;
                valid.push(id);
                total += option.hours;
            }
            return valid;
        }

        function defaultHoursSelection(group) {
            const exact = group.options.find(option => option.hours === group.targetHours);
            if (exact) return [exact.id];
            const selected = [];
            let total = 0;
            for (const option of group.options) {
                if (total + option.hours <= group.targetHours) {
                    selected.push(option.id);
                    total += option.hours;
                }
                if (total === group.targetHours) break;
            }
            return selected;
        }

        function getSelectedSubjects(plan) {
            const selected = [];
            for (const group of plan.choices || []) {
                const ids = state.selections[selectionKey(group.id)] || [];
                for (const id of ids) {
                    const option = group.options.find(item => item.id === id);
                    if (option) selected.push({ ...option, choiceLabel: group.label });
                }
            }
            return selected;
        }

        function hourSpan(hours) {
            return Math.min(6, Math.max(2, hours + 1));
        }

        function byHoursDescThenName(a, b) {
            if (b.hours !== a.hours) return b.hours - a.hours;
            return a.name.localeCompare(b.name, "es", { sensitivity: "base" });
        }

        function subjectRows(subjects) {
            return subjects.slice().sort(byHoursDescThenName).map(subject => `
                <article class="subject" style="grid-column: span ${hourSpan(subject.hours)};">
                    <div class="subject-main">
                        <div class="subject-icon"><i data-lucide="${subject.icon}"></i></div>
                        <div class="subject-name">
                            <strong>${subject.name}</strong>
                            <span>${subject.group}</span>
                        </div>
                    </div>
                    <div class="hours">${subject.hours}h</div>
                </article>
            `).join("");
        }

        function renderChoices(plan) {
            return (plan.choices || []).map(group => {
                const selected = state.selections[selectionKey(group.id)] || [];
                const inputType = group.mode === "hours" || group.max > 1 ? "checkbox" : "radio";
                const selectedTotal = group.mode === "hours" ? selectedHours(selected, group) : 0;
                const hasSelection = selected.length > 0;
                const optionHtml = group.options.slice().sort(byHoursDescThenName).map(option => {
                    const checked = selected.includes(option.id);
                    const displayOption = displaySubject(option);
                    return `
                        <label class="choice ${checked ? "selected" : ""}" style="grid-column: span ${hourSpan(option.hours)};">
                            <input type="${inputType}" name="${group.id}" value="${option.id}" ${checked ? "checked" : ""} data-group="${group.id}">
                            <strong>${displayOption.name}</strong>
                            <span class="hours">${option.hours}h</span>
                        </label>
                    `;
                }).join("");

                const note = group.mode === "hours"
                    ? `${selectedTotal}/${group.targetHours} horas`
                    : group.min === group.max
                    ? `Elegir ${group.min}`
                    : `Elegir entre ${group.min} y ${group.max}`;

                return `
                    <section class="section">
                        <div class="section-header">
                            <h3><i data-lucide="list-checks"></i>${group.label}</h3>
                            <span class="section-note">${note}</span>
                        </div>
                        <div class="choice-list ${hasSelection ? "has-selection" : ""}">${optionHtml}</div>
                    </section>
                `;
            }).join("");
        }

        function render() {
            app.classList.toggle("start-mode", !state.started);
            startScreen.classList.toggle("active", !state.started);
            if (!state.started) {
                renderIcons();
                return;
            }

            const course = getCourse();
            renderPathControl(course);
            renderLanguageControl();
            const plan = getPlan();
            ensureDefaults(plan);

            const languageSections = buildLanguageSections(plan);
            const fixed = (plan.fixed || []).filter(subject => !isLanguageSubject(subject));
            const selected = getSelectedSubjects(plan).map(displaySubject);
            const allSubjects = fixed.concat(languageSections.subjects, selected);
            const total = allSubjects.reduce((sum, item) => sum + item.hours, 0);
            const target = plan.target || 30;
            const percent = Math.min(100, Math.round((total / target) * 100));

            courseTitle.textContent = plan.baseTitle ? `${plan.baseTitle} · ${plan.label}` : plan.title;
            courseSubtitle.textContent = plan.subtitle || "";
            chips.innerHTML = [
                `<span class="chip green"><i data-lucide="school"></i>${data[state.stage].label}</span>`,
                `<span class="chip"><i data-lucide="clock-3"></i>${target} horas</span>`,
                course.paths ? `<span class="chip"><i data-lucide="route"></i>${plan.label}</span>` : ""
            ].filter(Boolean).join("");

            subjectsArea.innerHTML = `
                <section class="section">
                    <div class="section-header">
                        <h3><i data-lucide="book-marked"></i>Materias fijas</h3>
                        <span class="section-note">${fixed.reduce((sum, item) => sum + item.hours, 0)} horas</span>
                    </div>
                    <div class="subject-list fixed-list">${subjectRows(fixed)}</div>
                </section>
                ${languageSections.html}
                ${renderChoices(plan)}
            `;

            subjectsArea.querySelectorAll(".language-choice:not([aria-disabled='true'])").forEach(button => {
                button.addEventListener("click", () => {
                    state.languages.first = button.dataset.language;
                    render();
                });
            });

            totalHours.textContent = `${total}/${target}`;
            meterFill.style.width = `${percent}%`;
            meterFill.style.background = total === target ? "var(--green)" : total > target ? "var(--red)" : "var(--amber)";

            const incomplete = (plan.choices || []).filter(group => {
                const ids = state.selections[selectionKey(group.id)] || [];
                if (group.mode === "hours") return selectedHours(ids, group) !== group.targetHours;
                return ids.length < group.min || ids.length > group.max;
            });

            if (total === target && incomplete.length === 0) {
                statusBox.dataset.kind = "ok";
                statusBox.innerHTML = `<i data-lucide="check-circle-2"></i><span>Selección completa para ${target} horas.</span>`;
            } else if (total > target) {
                statusBox.dataset.kind = "warn";
                statusBox.innerHTML = `<i data-lucide="triangle-alert"></i><span>Hay ${total - target} horas por encima del total previsto.</span>`;
            } else {
                statusBox.dataset.kind = "warn";
                statusBox.innerHTML = `<i data-lucide="circle-alert"></i><span>Faltan ${target - total} horas o alguna elección obligatoria.</span>`;
            }

            printList.innerHTML = allSubjects
                .slice()
                .sort((a, b) => a.group.localeCompare(b.group, "es") || b.hours - a.hours || a.name.localeCompare(b.name, "es"))
                .map(subject => `
                    <div class="print-item">
                        <span>${subject.name}</span>
                        <strong>${subject.hours}h</strong>
                    </div>
                `).join("");

            bindChoiceEvents(plan);
            renderIcons();
        }

        function bindChoiceEvents(plan) {
            document.querySelectorAll(".choice input").forEach(input => {
                input.addEventListener("change", () => {
                    const group = (plan.choices || []).find(item => item.id === input.dataset.group);
                    const key = selectionKey(group.id);
                    const current = state.selections[key] || [];

                    if (group.mode === "hours") {
                        if (input.checked) {
                            const clicked = group.options.find(item => item.id === input.value);
                            let next = clicked && clicked.hours === group.targetHours
                                ? [input.value]
                                : current
                                    .filter(id => id !== input.value)
                                    .filter(id => {
                                        const option = group.options.find(item => item.id === id);
                                        return option && option.hours < group.targetHours;
                                    });

                            while (clicked && selectedHours(next, group) + clicked.hours > group.targetHours) {
                                next.shift();
                            }

                            state.selections[key] = clicked ? [...next, input.value] : next;
                        } else {
                            state.selections[key] = current.filter(id => id !== input.value);
                        }
                    } else if (group.max === 1) {
                        state.selections[key] = [input.value];
                    } else if (input.checked) {
                        const next = current.filter(id => id !== input.value);
                        while (next.length >= group.max) next.shift();
                        state.selections[key] = [...next, input.value];
                    } else {
                        state.selections[key] = current.filter(id => id !== input.value);
                    }

                    render();
                });
            });
        }

        document.getElementById("back-btn").addEventListener("click", () => {
            state.started = false;
            state.path = "";
            render();
        });

        document.getElementById("print-btn").addEventListener("click", () => window.print());

        initStartScreen();
        render();
    </script>
</body>
</html>
